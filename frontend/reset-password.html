<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentAI — Nouveau mot de passe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242736;--border:#2e3147;--accent:#6366f1;--accent2:#818cf8;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
    html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:grid;place-items:center;min-height:100vh}
    .card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;margin:20px}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:grid;place-items:center;font-size:20px}
    .logo-name{font-size:18px;font-weight:700}
    h1{font-size:22px;font-weight:700;margin-bottom:6px}
    .sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
    .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s}
    .field input:focus{border-color:var(--accent)}
    .field input::placeholder{color:var(--text3)}
    .strength{height:3px;border-radius:2px;margin-top:6px;background:var(--surface2);transition:background .3s}
    .strength.weak{background:var(--red)}
    .strength.medium{background:#f59e0b}
    .strength.strong{background:var(--green)}
    .btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:8px}
    .btn:hover{background:var(--accent2)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
    .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
    .msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
    .back{text-align:center;margin-top:20px;font-size:13px;color:var(--text3)}
    .back a{color:var(--accent2);text-decoration:none;font-weight:500}
    .back a:hover{text-decoration:underline}
    .invalid-token{text-align:center;padding:20px 0;display:none}
    .invalid-token .icon{font-size:48px;margin-bottom:16px}
    .invalid-token p{color:var(--text2);font-size:14px;line-height:1.7;margin-bottom:20px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-name">AgentAI Platform</div>
  </div>

  <!-- Invalid token state -->
  <div class="invalid-token" id="invalidState">
    <div class="icon">⚠️</div>
    <h1 style="margin-bottom:10px">Lien invalide ou expiré</h1>
    <p>Ce lien de réinitialisation n'est plus valide.<br/>Les liens expirent après <strong>1 heure</strong>.</p>
    <a href="/login" class="btn" style="display:inline-block;text-decoration:none;text-align:center">
      Refaire une demande →
    </a>
  </div>

  <!-- Reset form -->
  <div id="resetForm">
    <h1>Nouveau mot de passe</h1>
    <div class="sub">Choisissez un mot de passe sécurisé pour votre compte.</div>

    <div id="errorMsg"   class="msg error"></div>
    <div id="successMsg" class="msg success"></div>

    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="password" placeholder="Min. 8 caractères"
             oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')doReset()" />
      <div class="strength" id="strength"></div>
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirm" placeholder="Répétez votre mot de passe"
             onkeydown="if(event.key==='Enter')doReset()" />
    </div>
    <button class="btn" id="submitBtn" onclick="doReset()">Enregistrer le mot de passe</button>
  </div>

  <div class="back"><a href="/login">← Retour à la connexion</a></div>
</div>

<script>
  const token = new URLSearchParams(location.search).get('token');
  if (!token) showInvalid();

  function showInvalid() {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('invalidState').style.display = '';
  }

  function checkStrength(v) {
    const el = document.getElementById('strength');
    if (!v) { el.className = 'strength'; return; }
    const strong = v.length >= 12 && /[A-Z]/.test(v) && /\d/.test(v);
    const medium = v.length >= 8;
    el.className = 'strength ' + (strong ? 'strong' : medium ? 'medium' : 'weak');
  }

  function showError(msg)   { const e=document.getElementById('errorMsg');   e.textContent=msg; e.style.display=''; document.getElementById('successMsg').style.display='none'; }
  function showSuccess(msg) { const e=document.getElementById('successMsg'); e.textContent=msg; e.style.display=''; document.getElementById('errorMsg').style.display='none'; }

  async function doReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('submitBtn');

    if (!password || !confirm) return showError('Veuillez remplir tous les champs');
    if (password.length < 8)   return showError('Minimum 8 caractères');
    if (password !== confirm)  return showError('Les mots de passe ne correspondent pas');

    btn.disabled = true; btn.textContent = 'Enregistrement…';

    try {
      const res  = await fetch('/auth/reset-password', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token, new_password: password }),
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.detail || 'Erreur');
        btn.disabled = false; btn.textContent = 'Enregistrer le mot de passe';
        if (res.status === 400) setTimeout(showInvalid, 2000);
        return;
      }
      showSuccess('Mot de passe mis à jour ! Redirection…');
      setTimeout(() => location.href = '/login', 1800);
    } catch {
      showError('Impossible de contacter le serveur');
      btn.disabled = false; btn.textContent = 'Enregistrer le mot de passe';
    }
  }
</script>
</body>
</html>
